<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBVideoDownloader - Premium Facebook Video Downloader</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; justify-content: space-between; }
        header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: white; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
        .logo { font-size: 1.25rem; font-weight: 900; color: #0f172a; text-decoration: none; }
        .logo span { color: #2563eb; }
        .badge { background-color: #eff6ff; color: #1d4ed8; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 50px; }
        main { max-width: 28rem; margin: 3rem auto; width: 100%; padding: 0 1rem; box-sizing: border-box; text-align: center; flex-grow: 1; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; line-height: 1.2; }
        p { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
        input { padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; width: 100%; box-sizing: border-box; margin-bottom: 1rem; font-size: 0.875rem; outline: none; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
        button { background-color: #2563eb; color: white; font-weight: 700; width: 100%; padding: 0.75rem; border: none; border-radius: 0.75rem; cursor: pointer; transition: background 0.2s; font-size: 0.875rem; }
        button:hover { background-color: #1d4ed8; }
        .hidden { display: none !important; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #2563eb; animation: spin 1s linear infinite; margin: 1.5rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer { background-color: #0f172a; color: #94a3b8; padding: 1.5rem; text-align: center; font-size: 0.75rem; margin-top: auto; }
        footer p { color: #94a3b8; margin: 0; }
        .result-box { margin-top: 1.5rem; text-align: left; background: #f1f5f9; padding: 1rem; border-radius: 0.75rem; }
        .dl-link { display: block; text-align: center; background: #10b981; color: white; padding: 0.5rem; margin-top: 0.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: bold; }
        .dl-link:hover { background: #059669; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">FBVideo<span>Downloader</span></a>
        <span class="badge">100% Free</span>
    </header>

    <main>
        <div class="card">
            <h1>Premium FB Downloader</h1>
            <p>Download Facebook videos within 2-5 seconds safely.</p>

            <input type="text" id="videoUrl" placeholder="Paste Facebook video link here...">
            <button onclick="downloadVideo()" id="downloadBtn">Download Now</button>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <div style="color: #2563eb; font-size: 0.875rem; font-weight: 600;">Connecting to high-speed server...</div>
            </div>

            <!-- Result Options -->
            <div id="result" class="hidden result-box">
                <h3 style="margin-top:0; font-size:1rem;">Download Links:</h3>
                <div id="linksContainer"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 FBVideoDownloader. Premium Fast Engine.</p>
    </footer>

    <script>
        async function downloadVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const downloadBtn = document.getElementById('downloadBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('result');
            const linksContainer = document.getElementById('linksContainer');

            if (!videoUrl) {
                alert('Please paste a valid Facebook link!');
                return;
            }

            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');
            downloadBtn.disabled = true;
            linksContainer.innerHTML = '';

            try {
                // ভিডিও ডাউনলোডের জন্য একটি ফ্রি পাবলিক API ব্যবহার করা হয়েছে
                const response = await fetch(`https://ryzendesu.vip{encodeURIComponent(videoUrl)}`);
                const data = await response.json();

                if (data && data.result) {
                    if (data.result.hd) {
                        linksContainer.innerHTML += `<a href="${data.result.hd}" target="_blank" class="dl-link">Download HD Quality</a>`;
                    }
                    if (data.result.sd) {
                        linksContainer.innerHTML += `<a href="${data.result.sd}" target="_blank" class="dl-link" style="background:#64748b;">Download SD Quality</a>`;
                    }
                    resultBox.classList.remove('hidden');
                } else {
                    alert('Could not fetch video. Please make sure the video is public.');
                }
            } catch (error) {
                console.error(error);
                alert('Server error! Please try again later.');
            } finally {
                loading.classList.add('hidden');
                downloadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
