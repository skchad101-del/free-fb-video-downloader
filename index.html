<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBVideoDownloader - Free Facebook Video Downloader</title>
    <!-- Standard CSS Backup for UI Styling -->
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; justify-content: space-between; }
        header { bg-color: #ffffff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; items-center; max-w-6xl; margin: 0 auto; width: 100%; box-sizing: border-box; background: white; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
        .logo { font-size: 1.25rem; font-weight: 900; color: #0f172a; text-decoration: none; }
        .logo span { color: #2563eb; }
        .badge { background-color: #eff6ff; color: #1d4ed8; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; rounded: 9999px; border-radius: 50px; }
        main { max-width: 28rem; margin: 3rem auto; width: 100%; padding: 0 1rem; box-sizing: border-box; text-align: center; flex-grow: 1; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; }
        p { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
        input { w-full; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; width: 100%; box-sizing: border-box; margin-bottom: 1rem; font-size: 0.875rem; outline: none; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
        button { background-color: #2563eb; color: white; font-weight: 700; width: 100%; padding: 0.75rem; border: none; border-radius: 0.75rem; cursor: pointer; transition: background 0.2s; font-size: 0.875rem; }
        button:hover { background-color: #1d4ed8; }
        .hidden { display: none !important; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #2563eb; animation: spin 1s linear infinite; margin: 1.5rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box { margin-top: 1.5rem; padding: 1rem; background-color: #ecfdf5; border: 1px solid #d1fae5; border-radius: 0.75rem; }
        .result-box p { color: #065f46; font-weight: 700; margin-bottom: 1rem; }
        .btn-dl { display: inline-block; background-color: #059669; color: white; font-weight: 700; padding: 0.5rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-size: 0.875rem; }
        .btn-dl:hover { background-color: #047857; }
        .error-box { margin-top: 1.5rem; padding: 1rem; background-color: #fff1f2; border: 1px solid #ffe4e6; color: #9f1239; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 500; }
        footer { background-color: #0f172a; color: #94a3b8; padding: 1.5rem; text-align: center; font-size: 0.75rem; margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">FBVideo<span>Downloader</span></a>
        <span class="badge">100% Free</span>
    </header>

    <main>
        <div class="card">
            <h1>FB Video Downloader</h1>
            <p>Download Facebook videos in HD quality easily.</p>

            <input type="text" id="videoUrl" placeholder="Paste Facebook video link here...">
            <button onclick="downloadVideo()" id="downloadBtn">Get Download Links</button>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <div style="color: #2563eb; font-size: 0.875rem; font-weight: 600;">Fetching video source...</div>
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden result-box">
                <p>Your Video is Ready!</p>
                <a id="downloadLink" href="#" target="_blank" class="btn-dl">Download Video (MP4)</a>
            </div>
            
            <!-- Error Message -->
            <div id="error" class="hidden error-box"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 FBVideoDownloader. All rights reserved. Not affiliated with Facebook.</p>
    </footer>

    <script>
        async function downloadVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const downloadBtn = document.getElementById('downloadBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const downloadLink = document.getElementById('downloadLink');

            if (!videoUrl) {
                alert('Please enter a valid URL!');
                return;
            }

            errorDiv.classList.add('hidden');
            result.classList.add('hidden');
            loading.classList.remove('hidden');
            downloadBtn.disabled = true;

            try {
                // Using an alternative fallback public API for Facebook extraction
                const apiEndpoint = `https://vkrhost.in{encodeURIComponent(videoUrl)}`;
                const response = await fetch(apiEndpoint);
                
                if (!response.ok) throw new Error('API server down.');
                const data = await response.json();

                let finalUrl = "";
                if (data && data.data && data.data.url) finalUrl = data.data.url;
                else if (data && data.url) finalUrl = data.url;

                if (finalUrl) {
                    downloadLink.href = finalUrl;
                    result.classList.remove('hidden');
                } else {
                    // Fallback to open downloader service if API fails
                    window.open(`https://snapsave.app{encodeURIComponent(videoUrl)}`, '_blank');
                    loading.classList.add('hidden');
                    downloadBtn.disabled = false;
                    return;
                }
            } catch (err) {
                // Perfect fallback: Redirect user safely to save the download experience
                window.open(`https://snapsave.app{encodeURIComponent(videoUrl)}`, '_blank');
            } finally {
                loading.classList.add('hidden');
                downloadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
