<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGen - Free QR Code Generator</title>
    <!-- Tailwind CSS for Beautiful UI -->
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center max-w-6xl mx-auto w-full rounded-b-xl">
        <div class="flex items-center gap-2">
            <i class="fas fa-qrcode text-indigo-600 text-3xl"></i>
            <span class="text-xl font-black text-slate-900 tracking-tight">QR<span class="text-indigo-600">Gen</span></span>
        </div>
        <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">100% Free</span>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto w-full px-4 py-12 flex-grow flex flex-col items-center justify-center">
        
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-100 w-full text-center">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-2">QR Code Generator</h1>
            <p class="text-slate-500 text-xs sm:text-sm mb-6">Enter any text or URL below to generate a custom QR Code instantly.</p>

            <!-- Input Box -->
            <div class="mb-4">
                <input type="text" id="qrText" placeholder="Paste link or text here..." 
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-sm transition-all duration-200">
            </div>

            <!-- Generate Button -->
            <button onclick="generateQR()" id="genBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold w-full py-3 rounded-xl transition duration-200 shadow-md shadow-indigo-200 cursor-pointer flex items-center justify-center gap-2">
                <i class="fas fa-magic"></i> Generate QR Code
            </button>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden mt-6 flex items-center justify-center gap-2 text-indigo-600 font-semibold text-sm">
                <svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Creating QR Code...
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden mt-6 p-4 bg-slate-50 rounded-xl border border-slate-100 flex flex-col items-center">
                <div class="bg-white p-3 rounded-lg shadow-xs mb-4">
                    <img id="qrImage" src="" alt="QR Code" class="w-40 h-40">
                </div>
                <p class="text-slate-600 text-xs font-medium mb-3">Scan this QR Code with your mobile camera</p>
                <button onclick="downloadQR()" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2.5 rounded-xl transition duration-200 text-sm shadow-md">
                    <i class="fas fa-download"></i> Download Image
                </button>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-xs border-t border-slate-800">
        <p>© 2026 QRGen. Free Tool App.</p>
    </footer>

    <script>
        function generateQR() {
            const qrText = document.getElementById('qrText').value.trim();
            const genBtn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const qrImage = document.getElementById('qrImage');

            if (!qrText) {
                alert('Please enter some text or a valid link!');
                return;
            }

            // Show loading
            result.classList.add('hidden');
            loading.classList.remove('hidden');
            genBtn.disabled = true;

            // Using global stable open-source QR API
            const qrUrl = "https://qrserver.com" + encodeURIComponent(qrText);
            
            // Set image source
            qrImage.src = qrUrl;

            // Display result smoothly
            qrImage.onload = function() {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                genBtn.disabled = false;
            };
        }

        function downloadQR() {
            const qrImageSrc = document.getElementById('qrImage').src;
            if (!qrImageSrc) return;
            
            // Open image in a new tab for seamless saving on mobile devices
            window.open(qrImageSrc, '_blank');
        }
    </script>
</body>
</html>
